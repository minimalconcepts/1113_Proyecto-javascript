<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogo de Autos</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <!-- Encabezado del catalogo original de autos. -->
  <header>
    <h1>Catalogo de Autos</h1>
  </header>

  <main>
    <!-- Boton de navegacion: regresa a la portada servida por HomeController. -->
    <a href="/" style="display: inline-block; margin-bottom: 16px; padding: 10px 14px; background: #111827; color: white; border-radius: 6px; text-decoration: none; font-weight: bold;">
      Regresar al museo
    </a>

    <!-- Filtros del catalogo: JavaScript lee estos selectores para filtrar tarjetas. -->
    <section class="filtros">
      <label for="marca">Marca:</label>
      <select id="marca">
        <option value="todos">Todas</option>
        <option value="Aston Martin">Aston Martin</option>
        <option value="Bugatti">Bugatti</option>
        <option value="McLaren">McLaren</option>
        <option value="Saleen">Saleen</option>
        <option value="Hennesey">Hennesey</option>
        <option value="Audi">Audi</option>
        <option value="Koenigsegg">Koenigsegg</option>
        <option value="Pagani">Pagani</option>
        <option value="Zenvo">Zenvo</option>
        <option value="Lamborghini">Lamborghini</option>
      </select>

      <label for="tipo">Tipo:</label>
      <select id="tipo">
        <option value="todos">Todos</option>
        <option value="superdeportivo">Superdeportivo</option>
        <option value="deportivo">Deportivo</option>
        <option value="Muscle">Muscle</option>
      </select>
    </section>

    <!-- Contenedor dinamico: app.js inyecta las tarjetas de autos aqui. -->
    <section id="catalogo"></section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
